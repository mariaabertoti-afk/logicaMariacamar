<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<title>Exercício 02</title>

<style>

body{
    font-family:Arial;
    margin:40px;
}

.caixa{
    border:1px solid gray;
    padding:20px;
    margin-bottom:30px;
    border-radius:10px;
}

.cancelar{
    border:2px dashed red;
}

ul{
    list-style-type:square;
}

ol{
    list-style-type:decimal;
}

li{
    margin:10px 0;
}

strong{
    color:blue;
}

</style>

</head>

<body>

<h1>Termos de Serviço</h1>

<div class="caixa">

<h2>Obrigações</h2>

<ul>

<li><strong>Registrar</strong> dados verdadeiros</li>

<li>Não compartilhar senha</li>

</ul>

</div>

<div class="caixa cancelar">

<h2>Cancelar Conta</h2>

<ol>

<li>Acessar configurações</li>

<li><strong>Encerrar Conta</strong></li>

</ol>

</div>

</body>
</html>
