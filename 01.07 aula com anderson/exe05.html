<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Exercício 05</title>

<style>

body{

font-family:Arial;
margin:40px;

}

label{

display:block;
margin-top:15px;

}

input,select{

width:100%;
padding:10px;
border:1px solid gray;
border-radius:8px;

}

input:focus,
select:focus{

border:2px solid blue;
box-shadow:0 0 5px blue;
outline:none;

}

button{

margin-top:20px;
padding:12px;
background:blue;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:darkblue;

}

</style>

</head>

<body>

<h1>Cadastro</h1>

<form>

<label>Nome</label>

<input type="text">

<label>Área</label>

<select>

<option>Programação</option>

<option>Design</option>

</select>

<button>Enviar Cadastro</button>

</form>

</body>
</html>
