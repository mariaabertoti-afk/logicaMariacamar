<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Exercício 09</title>

<style>

body{
    font-family:Arial;
    margin:40px;
}

fieldset{
    border:none;
    box-shadow:0 0 5px gray;
    padding:20px;
    margin-bottom:20px;
}

legend{
    font-size:20px;
    font-weight:bold;
    color:blue;
}

input:required{
    border:2px solid red;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
}

</style>

</head>

<body>

<form>

<fieldset>

<legend>Informações Pessoais</legend>

<input type="text" placeholder="Nome" required>

<input type="date">

</fieldset>

<fieldset>

<legend>Dados Profissionais</legend>

<input type="text" placeholder="Profissão">

</fieldset>

</form>

</body>
</html>
